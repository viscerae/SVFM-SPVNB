<!DOCTYPE html>
<html lang="en">
<div>
  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  fetch("https://svfmnb.com/api/login.php", {
    method: "POST",
    body: new URLSearchParams({
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(r => r.json())
  .then(data => {
    alert(data.success ? "Logged in!" : "Failed login");
  });
}
</script>

<button onclick="submitIssue()">Submit Issue</button>

<script>
function submitIssue() {
  fetch("https://svfmnb.com/api/addIssue.php", {
    method: "POST"
  })
  .then(r => r.json())
  .then(data => {
    console.log(data);

    if (data.success) {
      alert("Issue created: " + data.issueID);
    } else {
      alert(data.error || "Failed");
    }
  })
  .catch(err => {
    console.error(err);
    alert("Request failed");
  });
}
</script>
</html>
